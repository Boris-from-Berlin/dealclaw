<script src="js/translations.js"></script>
<script>
// ===== DARK MODE =====
function toggleDarkMode() {
  var isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('dealclaw_dark', isDark ? 'true' : 'false');
  document.getElementById('darkToggle').innerHTML = isDark ? '&#x2600;' : '&#x263E;';
}
(function() {
  var stored = localStorage.getItem('dealclaw_dark');
  var isDark = stored !== null ? stored === 'true' : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if (isDark) document.documentElement.classList.add('dark');
  document.getElementById('darkToggle').innerHTML = isDark ? '&#x2600;' : '&#x263E;';
})();

// ===== LANGUAGE SWITCHER =====
function toggleLangDropdown() {
  document.getElementById('langDropdown').classList.toggle('open');
}
function switchLang(lang) {
  applyTranslations(lang);
  document.getElementById('langBtn').textContent = lang.toUpperCase();
  document.getElementById('langDropdown').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.lang-switcher')) {
    document.getElementById('langDropdown').classList.remove('open');
  }
});
(function() {
  var lang = getPreferredLanguage();
  applyTranslations(lang);
  document.getElementById('langBtn').textContent = lang.toUpperCase();
})();

// ===== AUTH NAV UPDATE =====
(function() {
  var token = localStorage.getItem('dealclaw_token');
  var link = document.getElementById('navAuthLink');
  if (token && link) {
    link.textContent = translations[getPreferredLanguage()].navDashboard || 'Dashboard';
    link.href = '/dashboard.html';
  }
})();
</script>
<!-- COOKIE BANNER -->
<div class="cookie-banner" id="cookieBanner">
  <div class="cookie-inner">
    <div class="cookie-text">
      <span data-i18n="cookieText">This website uses technically necessary local storage for basic functions. More information in our</span>
      <a href="/datenschutz.html" data-i18n="cookieLink">Privacy Policy</a>.
    </div>
    <div class="cookie-buttons">
      <button class="cookie-btn cookie-btn-reject" onclick="handleCookieChoice('reject')" data-i18n="cookieReject">Necessary only</button>
      <button class="cookie-btn cookie-btn-accept" onclick="handleCookieChoice('accept')" data-i18n="cookieAccept">Accept all</button>
    </div>
  </div>
</div>
<script>
function handleCookieChoice(choice) {
  localStorage.setItem('dealclaw_consent', JSON.stringify({ choice: choice, timestamp: new Date().toISOString() }));
  document.getElementById('cookieBanner').style.display = 'none';
}
(function() {
  if (!localStorage.getItem('dealclaw_consent')) document.getElementById('cookieBanner').style.display = 'block';
})();
</script>
